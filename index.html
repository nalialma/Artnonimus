<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ArtNonimu's — Tienda Virtual | Polska</title>
<meta name="description" content="Tienda de arte de ArtNonimu's — obras físicas y arte virtual, envíos a Europa, Latinoamérica y el mundo.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Monoton&family=Unbounded:wght@400;600;800&family=Quicksand:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

:root{
  --pearl:#f6eefc; --pink:#ffb8e6; --pink-soft: rgba(255,184,230,.55);
  --cyan:#b8f2ff; --cyan-soft: rgba(184,242,255,.5);
  --lilac:#d9c2ff; --lilac-soft: rgba(217,194,255,.5);
  --void:#0b0714; --glass: rgba(255,255,255,.07); --glass-2: rgba(255,255,255,.045);
  --glass-brd: rgba(255,255,255,.18); --ease-dream: cubic-bezier(.22,.9,.32,1); --nav-h:64px;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
body{ min-height:100svh; background:var(--void); color:var(--pearl); font-family:'Quicksand',sans-serif; overflow-x:hidden; position:relative; isolation:isolate; }
img{ max-width:100%; display:block; }
button, input, select{ font-family:inherit; }
a{ color:inherit; text-decoration:none; }

.bg-video{ position:fixed; inset:0; z-index:0; width:100%; height:100%; object-fit:cover; background:var(--void); filter: saturate(1.05) brightness(.78) contrast(1.02); }
.video-overlay{ position:fixed; inset:0; z-index:1; pointer-events:none;
  background: radial-gradient(ellipse 70% 55% at 50% 30%, rgba(11,7,20,.05) 0%, rgba(11,7,20,.6) 68%, rgba(11,7,20,.9) 100%),
              linear-gradient(180deg, rgba(11,7,20,.4) 0%, transparent 22%, transparent 78%, rgba(11,7,20,.6) 100%); }

.glass-panel{ background:var(--glass); border:1px solid var(--glass-brd); backdrop-filter: blur(18px) saturate(1.2); -webkit-backdrop-filter: blur(18px) saturate(1.2); border-radius:22px; }
.glow-pink{ color:var(--pink); text-shadow:0 0 10px var(--pink-soft), 0 0 28px rgba(255,184,230,.35); }
.glow-cyan{ color:var(--cyan); text-shadow:0 0 10px var(--cyan-soft), 0 0 28px rgba(184,242,255,.35); }
.glow-lilac{ color:var(--lilac); text-shadow:0 0 10px var(--lilac-soft), 0 0 28px rgba(217,194,255,.35); }

@media (prefers-reduced-motion: reduce){ *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; scroll-behavior:auto !important; } }

::-webkit-scrollbar{ width:6px; }
::-webkit-scrollbar-track{ background:transparent; }
::-webkit-scrollbar-thumb{ background:linear-gradient(var(--lilac),var(--cyan)); border-radius:3px; }
a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible{ outline:2px solid var(--cyan); outline-offset:3px; }

/* ---------------- TOP BAR ---------------- */
.top-bar{ position:fixed; top:0; left:0; right:0; z-index:40; display:flex; align-items:center; justify-content:space-between; padding:12px 16px; gap:10px; }
.mini-logo{ width:44px; height:44px; border-radius:50%; flex:0 0 auto; }
.mini-logo img{ width:100%; height:100%; object-fit:cover; border-radius:50%; mix-blend-mode:screen; filter:contrast(1.2) brightness(1.1) saturate(1.15); }
.top-actions{ display:flex; align-items:center; gap:8px; }

.lang-switch{ display:flex; flex-wrap:wrap; gap:5px; }
.lang-pill{ width:30px; height:30px; border-radius:50%; border:1px solid var(--glass-brd); background:var(--glass-2); backdrop-filter:blur(10px); color:rgba(246,238,252,.55); font-family:'Space Mono',monospace; font-size:.58rem; cursor:pointer; transition:.3s; }
.lang-pill:hover{ color:var(--pearl); border-color:var(--pink-soft); }
.lang-pill.is-active{ color:#1a1024; background:var(--pearl); border-color:var(--pearl); box-shadow:0 0 14px rgba(246,238,252,.5); }

.icon-btn{ position:relative; width:40px; height:40px; border-radius:50%; border:1px solid var(--glass-brd); background:var(--glass-2); backdrop-filter:blur(10px); color:var(--pearl); display:flex; align-items:center; justify-content:center; cursor:pointer; transition: border-color .3s, box-shadow .3s; }
.icon-btn:hover{ border-color:var(--pink-soft); box-shadow:0 0 14px rgba(255,184,230,.3); }
.icon-btn svg{ width:18px; height:18px; }
.cart-count{ position:absolute; top:-4px; right:-4px; min-width:18px; height:18px; padding:0 4px; border-radius:999px; background:var(--pink); color:#1a1024; font-family:'Space Mono',monospace; font-size:.6rem; display:flex; align-items:center; justify-content:center; font-weight:700; }
.admin-trigger{ opacity:.45; }
.admin-trigger.is-admin{ opacity:1; border-color:var(--cyan-soft); color:var(--cyan); }

/* ---------------- HERO / TABS ---------------- */
.shop-shell{ position:relative; z-index:2; padding: calc(var(--nav-h) + 1.5rem) 1.1rem 7rem; max-width:1180px; margin:0 auto; }
.shop-hero{ text-align:center; margin-bottom:1.8rem; }
.eyebrow{ display:inline-flex; align-items:center; gap:.5rem; font-family:'Space Mono',monospace; font-size:.6rem; letter-spacing:.3em; text-transform:uppercase; color:var(--cyan); opacity:.85; margin-bottom:.7rem; }
.eyebrow::before, .eyebrow::after{ content:''; width:14px; height:1px; background:var(--cyan); box-shadow:0 0 6px var(--cyan-soft); }
.shop-hero h1{ font-family:'Unbounded',sans-serif; font-weight:800; font-size:clamp(1.7rem,5vw,2.8rem); margin-bottom:.6rem; }
.shop-hero p{ max-width:520px; margin:0 auto; color:rgba(246,238,252,.68); font-size:.94rem; line-height:1.55; }

.tabs-row{ display:flex; justify-content:center; gap:.6rem; margin:1.6rem 0 1.8rem; flex-wrap:wrap; }
.tab-btn{ padding:.7rem 1.3rem; border-radius:999px; border:1px solid var(--glass-brd); background:var(--glass); color:rgba(246,238,252,.7); font-family:'Unbounded',sans-serif; font-weight:600; font-size:.75rem; letter-spacing:.03em; text-transform:uppercase; cursor:pointer; transition:.3s; }
.tab-btn.is-active{ color:#1a1024; background:var(--pearl); border-color:var(--pearl); box-shadow:0 0 20px rgba(246,238,252,.4); }
.tab-btn:not(.is-active):hover{ border-color:var(--cyan-soft); color:var(--pearl); }

/* ---------------- PRODUCT GRID ---------------- */
.product-grid{ display:grid; gap:1.1rem; grid-template-columns:1fr; }
@media(min-width:560px){ .product-grid{ grid-template-columns:repeat(2,1fr); } }
@media(min-width:880px){ .product-grid{ grid-template-columns:repeat(3,1fr); } }
@media(min-width:1140px){ .product-grid{ grid-template-columns:repeat(4,1fr); } }

.product-card{ position:relative; overflow:hidden; display:flex; flex-direction:column; }
.product-img-wrap{ position:relative; aspect-ratio:1/1; overflow:hidden; border-radius:22px 22px 0 0; background:rgba(0,0,0,.25); }
.product-img-wrap img{ width:100%; height:100%; object-fit:cover; transition: transform .5s var(--ease-dream); }
.product-card:hover .product-img-wrap img{ transform:scale(1.05); }
.sold-badge{ position:absolute; top:10px; left:10px; padding:.3rem .7rem; border-radius:999px; background:rgba(11,7,20,.6); color:var(--pink); font-family:'Space Mono',monospace; font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; }
.delete-badge{ position:absolute; top:10px; right:10px; width:30px; height:30px; border-radius:50%; border:1px solid rgba(255,120,120,.5); background:rgba(20,8,10,.7); color:#ffb3b3; font-size:1rem; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.product-body{ padding:.9rem 1rem 1.1rem; display:flex; flex-direction:column; gap:.4rem; flex:1; }
.product-body h3{ font-family:'Unbounded',sans-serif; font-weight:600; font-size:.98rem; }
.product-meta{ font-family:'Space Mono',monospace; font-size:.62rem; letter-spacing:.06em; text-transform:uppercase; color:rgba(246,238,252,.5); }
.product-price{ font-family:'Unbounded',sans-serif; font-weight:800; font-size:1.05rem; color:var(--pink); margin-top:.2rem; }
.add-cart-btn{ margin-top:.5rem; display:inline-flex; align-items:center; justify-content:center; gap:.4rem; padding:.65rem 1rem; border-radius:999px; background:linear-gradient(135deg,var(--pink),var(--lilac)); color:#1a1024; font-family:'Unbounded',sans-serif; font-weight:600; font-size:.7rem; letter-spacing:.03em; text-transform:uppercase; border:none; cursor:pointer; transition: box-shadow .3s, transform .3s; }
.add-cart-btn:hover{ box-shadow:0 0 22px rgba(255,184,230,.5); transform:translateY(-2px); }
.add-cart-btn:disabled{ opacity:.4; cursor:not-allowed; box-shadow:none; transform:none; }
.empty-note{ text-align:center; font-family:'Space Mono',monospace; font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:rgba(246,238,252,.4); padding:3rem 0; grid-column:1/-1; }

/* ---------------- CART DRAWER ---------------- */
.cart-overlay{ position:fixed; inset:0; z-index:80; background:rgba(11,7,20,.55); backdrop-filter:blur(6px); opacity:0; visibility:hidden; transition:opacity .35s, visibility .35s; }
.cart-overlay.is-open{ opacity:1; visibility:visible; }
.cart-drawer{ position:fixed; top:0; right:0; bottom:0; z-index:81; width:min(400px,92vw); display:flex; flex-direction:column; border-radius:24px 0 0 24px; transform:translateX(100%); transition: transform .45s var(--ease-dream); }
.cart-drawer.is-open{ transform:translateX(0); }
.cart-head{ display:flex; align-items:center; justify-content:space-between; padding:1.2rem 1.3rem; border-bottom:1px solid var(--glass-brd); }
.cart-head h2{ font-family:'Unbounded',sans-serif; font-weight:800; font-size:1.1rem; }
.cart-close{ width:34px; height:34px; border-radius:50%; border:1px solid var(--glass-brd); background:var(--glass-2); color:var(--pearl); font-size:1rem; cursor:pointer; }
.cart-items{ flex:1; overflow-y:auto; padding:1rem 1.3rem; display:flex; flex-direction:column; gap:.9rem; }
.cart-item{ display:flex; gap:.7rem; align-items:center; }
.cart-item img{ width:56px; height:56px; object-fit:cover; border-radius:12px; flex:0 0 auto; }
.cart-item-info{ flex:1; min-width:0; }
.cart-item-info h4{ font-family:'Unbounded',sans-serif; font-size:.8rem; margin-bottom:.15rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.qty-row{ display:flex; align-items:center; gap:.5rem; font-family:'Space Mono',monospace; font-size:.72rem; }
.qty-btn{ width:22px; height:22px; border-radius:50%; border:1px solid var(--glass-brd); background:var(--glass-2); color:var(--pearl); cursor:pointer; line-height:1; }
.cart-item-remove{ background:none; border:none; color:rgba(255,140,140,.8); font-size:.9rem; cursor:pointer; padding:.2rem; }
.cart-foot{ padding:1.1rem 1.3rem 1.4rem; border-top:1px solid var(--glass-brd); }
.cart-total-row{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:.9rem; font-family:'Unbounded',sans-serif; }
.cart-total-row .val{ font-weight:800; font-size:1.2rem; color:var(--pink); }
.checkout-btn{ width:100%; padding:.9rem; border-radius:999px; border:none; background:linear-gradient(135deg,var(--pink),var(--lilac)); color:#1a1024; font-family:'Unbounded',sans-serif; font-weight:700; font-size:.85rem; letter-spacing:.03em; text-transform:uppercase; cursor:pointer; transition:.3s; }
.checkout-btn:hover{ box-shadow:0 0 26px rgba(255,184,230,.5); }
.checkout-btn:disabled{ opacity:.4; cursor:not-allowed; }
.cart-empty-msg{ text-align:center; color:rgba(246,238,252,.5); font-size:.85rem; padding:2rem 0; }

/* ---------------- ADMIN MODAL ---------------- */
.modal-overlay{ position:fixed; inset:0; z-index:90; display:flex; align-items:center; justify-content:center; padding:1.5rem; background:rgba(11,7,20,.6); backdrop-filter:blur(6px); opacity:0; visibility:hidden; transition:opacity .35s, visibility .35s; }
.modal-overlay.is-open{ opacity:1; visibility:visible; }
.modal-panel{ position:relative; max-width:420px; width:100%; padding:2rem 1.7rem 1.7rem; }
.modal-close{ position:absolute; top:.5rem; right:.5rem; width:34px; height:34px; border-radius:50%; border:1px solid var(--glass-brd); background:var(--glass-2); color:var(--pearl); font-size:1rem; cursor:pointer; }
.modal-panel h2{ font-family:'Unbounded',sans-serif; font-weight:800; font-size:1.15rem; margin-bottom:1.2rem; text-align:center; }
.field{ margin-bottom:.9rem; }
.field label{ display:block; font-family:'Space Mono',monospace; font-size:.62rem; letter-spacing:.08em; text-transform:uppercase; color:rgba(246,238,252,.55); margin-bottom:.35rem; }
.field input, .field select, .field textarea{ width:100%; padding:.7rem .8rem; border-radius:12px; border:1px solid var(--glass-brd); background:rgba(255,255,255,.06); color:var(--pearl); font-size:.85rem; }
.field textarea{ resize:vertical; min-height:60px; }
.modal-submit{ width:100%; padding:.85rem; border-radius:999px; border:none; background:linear-gradient(135deg,var(--pink),var(--lilac)); color:#1a1024; font-family:'Unbounded',sans-serif; font-weight:700; font-size:.82rem; letter-spacing:.03em; text-transform:uppercase; cursor:pointer; margin-top:.4rem; }
.modal-msg{ text-align:center; font-family:'Space Mono',monospace; font-size:.68rem; letter-spacing:.05em; margin-top:.7rem; min-height:1em; }
.modal-msg.is-error{ color:#ff9d9d; }
.modal-msg.is-ok{ color:var(--cyan); }
.admin-row-2{ display:grid; grid-template-columns:1fr 1fr; gap:.7rem; }

.site-footer{ position:fixed; bottom:14px; left:0; right:0; z-index:20; display:flex; justify-content:center; }
.footer-credit{ font-family:'Space Mono',monospace; font-size:.6rem; letter-spacing:.16em; text-transform:uppercase; color:rgba(246,238,252,.4); padding:.5rem 1rem; border-radius:999px; }
.footer-credit:hover{ color:var(--cyan); }
</style>
</head>

<video class="bg-video" autoplay muted loop playsinline poster="">
  <source src="Vdo3.mp4" type="video/mp4">
</video>
<div class="video-overlay"></div>

<div class="top-bar">
  <a class="mini-logo" href="index.html" aria-label="Volver al inicio">
    <img src="https://i.ibb.co/mPQjbWs/1784228306856.png" alt="ArtNonimu's">

  <div class="top-actions">
    <div class="lang-switch" role="group" aria-label="Idioma">
      <button type="button" data-lang="pl" class="lang-pill is-active">PL</button>
      <button type="button" data-lang="en" class="lang-pill">EN</button>
      <button type="button" data-lang="es" class="lang-pill">ES</button>
      <button type="button" data-lang="it" class="lang-pill">IT</button>
      <button type="button" data-lang="pt" class="lang-pill">PT</button>
    </div>
    <button type="button" id="admin-trigger" class="icon-btn admin-trigger" aria-label="Admin" title="Admin">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M19.4 13a7.4 7.4 0 0 0 0-2l1.9-1.5-2-3.4-2.2.9a7.6 7.6 0 0 0-1.7-1L15 4h-4l-.4 2a7.6 7.6 0 0 0-1.7 1l-2.2-.9-2 3.4L6.6 11a7.4 7.4 0 0 0 0 2l-1.9 1.5 2 3.4 2.2-.9c.5.4 1.1.75 1.7 1l.4 2h4l.4-2c.6-.25 1.2-.6 1.7-1l2.2.9 2-3.4L19.4 13Z"/></svg>

      <span class="cart-count" id="cart-count">0</span>
    </button>
  </div>
</div>

<main class="shop-shell">
  <div class="shop-hero">
    <div class="eyebrow" data-i18n="shop_eyebrow">TIENDA · POLSKA</div>
    <h1 data-i18n="shop_h1">Tienda Virtual</h1>
    <p data-i18n="shop_sub">Obras físicas originales y arte virtual — envíos a Europa, Latinoamérica y el mundo entero.</p>
  </div>

  <div class="tabs-row">
    <button type="button" class="tab-btn is-active" data-cat="fisica" data-i18n="tab_fisica">Arte Física</button>
    <button type="button" class="tab-btn" data-cat="virtual" data-i18n="tab_virtual">Arte Virtual</button>
  </div>

  <div id="product-grid" class="product-grid">
    <div class="empty-note" data-i18n="loading">Cargando obras…</div>
  </div>
</main>

<!-- CARRITO -->
<div id="cart-overlay" class="cart-overlay"></div>
<aside id="cart-drawer" class="cart-drawer glass-panel">
  <div class="cart-head">
    <h2 data-i18n="cart_title">Tu carrito</h2>
    <button type="button" id="cart-close" class="cart-close" aria-label="Cerrar">×</button>
  </div>
  <div id="cart-items" class="cart-items"></div>
  <div class="cart-foot">
    <div class="cart-total-row">
      <span data-i18n="cart_total">Total</span>
      <span class="val" id="cart-total">€0.00</span>
    </div>
    <button type="button" id="checkout-btn" class="checkout-btn" data-i18n="checkout_btn">Pagar ahora</button>
  </div>
</aside>

<!-- ADMIN LOGIN (solo contraseña) -->
<div id="admin-login-overlay" class="modal-overlay">
  <div class="modal-panel glass-panel">
    <button type="button" class="modal-close" data-close-modal="admin-login-overlay">×</button>
    <h2 class="glow-lilac" data-i18n="admin_login_title">Acceso de administrador</h2>
    <div class="field">
      <input type="password" id="admin-password-input" data-i18n-placeholder="admin_password_placeholder" placeholder="Contraseña" autocomplete="current-password">
    </div>
    <button type="button" id="admin-login-submit" class="modal-submit" data-i18n="admin_login_btn">Entrar</button>
    <div id="admin-login-msg" class="modal-msg"></div>
  </div>
</div>

<!-- ADMIN: SUBIR OBRA -->
<div id="admin-upload-overlay" class="modal-overlay">
  <div class="modal-panel glass-panel">
    <button type="button" class="modal-close" data-close-modal="admin-upload-overlay">×</button>
    <h2 class="glow-cyan" data-i18n="admin_upload_title">Subir nueva obra</h2>
    <div class="field"><label data-i18n="f_title">Título</label><input type="text" id="f-title"></div>
    <div class="field"><label data-i18n="f_desc">Descripción</label><textarea id="f-desc"></textarea></div>
    <div class="admin-row-2">
      <div class="field"><label data-i18n="f_category">Categoría</label>
        <select id="f-category">
          <option value="fisica" data-i18n="tab_fisica">Arte Física</option>
          <option value="virtual" data-i18n="tab_virtual">Arte Virtual</option>
        </select>
      </div>
      <div class="field"><label data-i18n="f_price">Precio (EUR)</label><input type="number" id="f-price" step="0.01" min="0"></div>
    </div>
    <div class="admin-row-2">
      <div class="field"><label data-i18n="f_technique">Técnica</label><input type="text" id="f-technique"></div>
      <div class="field"><label data-i18n="f_dims">Dimensiones</label><input type="text" id="f-dims"></div>
    </div>
    <div class="field"><label data-i18n="f_file">Imagen</label><input type="file" id="f-file" accept="image/*"></div>
    <button type="button" id="admin-upload-submit" class="modal-submit" data-i18n="admin_upload_submit">Publicar obra</button>
    <div id="admin-upload-msg" class="modal-msg"></div>
  </div>
</div>

<footer class="site-footer">
  <a class="footer-credit" href="https://septimapacha.com" target="_blank" rel="noopener">stworzone przez septimapacha.com</a>
</footer>

let currentLang = "pl";
function t(k){ return (translations[currentLang]&&translations[currentLang][k]) ?? translations.pl[k] ?? ""; }
function applyLanguage(lang){
  currentLang = translations[lang] ? lang : "pl";
  document.querySelectorAll("[data-i18n]").forEach(el=>{ const v=t(el.getAttribute("data-i18n")); if(v) el.textContent=v; });
  document.querySelectorAll("[data-i18n-placeholder]").forEach(el=>{ const v=t(el.getAttribute("data-i18n-placeholder")); if(v) el.setAttribute("placeholder",v); });
  document.querySelectorAll(".lang-pill").forEach(b=>b.classList.toggle("is-active", b.getAttribute("data-lang")===currentLang));
  document.documentElement.setAttribute("lang", currentLang);
  renderProducts();
}

/* ============================================================
   ESTADO
   ============================================================ */
let allProducts = [];
let activeCategory = "fisica";
let cart = JSON.parse(localStorage.getItem("an_cart") || "[]");
let adminToken = sessionStorage.getItem("an_admin_token") || null;

function saveCart(){ localStorage.setItem("an_cart", JSON.stringify(cart)); updateCartUI(); }

/* ============================================================
   PRODUCTOS
   ============================================================ */
async function loadProducts(){
  const grid = document.getElementById("product-grid");
  const { data, error } = await supabase.from("products").select("*").order("created_at", { ascending:false });
  if(error){
    grid.innerHTML = `<div class="empty-note">Error: ${error.message}</div>`;
    return;
  }
  allProducts = data || [];
  renderProducts();
}

function renderProducts(){
  const grid = document.getElementById("product-grid");
  const list = allProducts.filter(p=>p.category===activeCategory);
  if(list.length===0){ grid.innerHTML = `<div class="empty-note">${t("empty")}</div>`; return; }

  grid.innerHTML = list.map(p=>`
    <div class="product-card glass-panel" data-id="${p.id}">
      <div class="product-img-wrap">
        <img src="${p.image_url}" alt="${escapeHtml(p.title)}" loading="lazy">
        ${p.is_sold ? `<span class="sold-badge">${t("sold_out")}</span>` : ""}
        ${adminToken ? `<button type="button" class="delete-badge" data-delete-id="${p.id}" aria-label="Eliminar">×</button>` : ""}
      </div>
      <div class="product-body">
        <h3>${escapeHtml(p.title)}</h3>
        ${p.technique ? `<div class="product-meta">${escapeHtml(p.technique)}${p.dimensions ? " · "+escapeHtml(p.dimensions) : ""}</div>` : ""}
        <div class="product-price">${formatPrice(p.price, p.currency)}</div>
        <button type="button" class="add-cart-btn" data-add-id="${p.id}" ${p.is_sold ? "disabled" : ""}>${t("add_to_cart")}</button>
      </div>
    </div>
  `).join("");
}

function formatPrice(price, currency){
  const symbols = { EUR:"€", USD:"$", GBP:"£", PLN:"zł" };
  const sym = symbols[currency] || (currency ? currency+" " : "€");
  return `${sym}${Number(price).toFixed(2)}`;
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
}

document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("is-active", b===btn));
    activeCategory = btn.getAttribute("data-cat");
    renderProducts();
  });
});

/* ============================================================
   CARRITO
   ============================================================ */
function updateCartUI(){
  const itemsBox = document.getElementById("cart-items");
  const countEl = document.getElementById("cart-count");
  const totalEl = document.getElementById("cart-total");
  const checkoutBtn = document.getElementById("checkout-btn");

  const totalQty = cart.reduce((s,i)=>s+i.quantity,0);
  countEl.textContent = totalQty;

  if(cart.length===0){
    itemsBox.innerHTML = `<p class="cart-empty-msg">${t("cart_empty")}</p>`;
    checkoutBtn.disabled = true;
  } else {
    itemsBox.innerHTML = cart.map(i=>`
      <div class="cart-item" data-cart-id="${i.id}">
        <img src="${i.image}" alt="${escapeHtml(i.title)}">
        <div class="cart-item-info">
          <h4>${escapeHtml(i.title)}</h4>
          <div class="qty-row">
            <button type="button" class="qty-btn" data-qty="-1">−</button>
            <span>${i.quantity}</span>
            <button type="button" class="qty-btn" data-qty="1">+</button>
            <span>${formatPrice(i.price*i.quantity, i.currency)}</span>
          </div>
        </div>
        <button type="button" class="cart-item-remove" data-remove="1" aria-label="Quitar">×</button>
      </div>
    `).join("");
    checkoutBtn.disabled = false;
  }

  const total = cart.reduce((s,i)=>s+i.price*i.quantity,0);
  const currency = cart[0]?.currency || "EUR";
  totalEl.textContent = formatPrice(total, currency);
}

function addToCart(id){
  const p = allProducts.find(x=>x.id===id);
  if(!p || p.is_sold) return;
  const existing = cart.find(i=>i.id===id);
  if(existing) existing.quantity += 1;
  else cart.push({ id:p.id, title:p.title, price:p.price, currency:p.currency, image:p.image_url, quantity:1 });
  saveCart();
  openCart();
}
function changeQty(id, delta){
  const item = cart.find(i=>i.id===id);
  if(!item) return;
  item.quantity += delta;
  if(item.quantity<=0) cart = cart.filter(i=>i.id!==id);
  saveCart();
}
function removeFromCart(id){ cart = cart.filter(i=>i.id!==id); saveCart(); }

const cartOverlay = document.getElementById("cart-overlay");
const cartDrawer = document.getElementById("cart-drawer");
function openCart(){ cartOverlay.classList.add("is-open"); cartDrawer.classList.add("is-open"); }
function closeCart(){ cartOverlay.classList.remove("is-open"); cartDrawer.classList.remove("is-open"); }
document.getElementById("cart-trigger").addEventListener("click", openCart);
document.getElementById("cart-close").addEventListener("click", closeCart);
cartOverlay.addEventListener("click", closeCart);

document.getElementById("product-grid").addEventListener("click", (e)=>{
  const addBtn = e.target.closest("[data-add-id]");
  if(addBtn){ addToCart(addBtn.getAttribute("data-add-id")); return; }
  const delBtn = e.target.closest("[data-delete-id]");
  if(delBtn){ deleteProduct(delBtn.getAttribute("data-delete-id")); return; }
});

document.getElementById("cart-items").addEventListener("click", (e)=>{
  const cartItemEl = e.target.closest("[data-cart-id]");
  if(!cartItemEl) return;
  const id = cartItemEl.getAttribute("data-cart-id");
  const qtyBtn = e.target.closest("[data-qty]");
  if(qtyBtn){ changeQty(id, Number(qtyBtn.getAttribute("data-qty"))); return; }
  if(e.target.closest("[data-remove]")){ removeFromCart(id); }
});

/* ============================================================
   CHECKOUT (Stripe vía Edge Function)
   ============================================================ */
document.getElementById("checkout-btn").addEventListener("click", async ()=>{
  const btn = document.getElementById("checkout-btn");
  btn.disabled = true;
  try{
    const res = await fetch(`${FUNCTIONS_URL}/create-checkout-session`, {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":`Bearer ${SUPABASE_ANON_KEY}` },
      body: JSON.stringify({
        items: cart,
        successUrl: window.location.origin + window.location.pathname + "?pago=exito",
        cancelUrl: window.location.origin + window.location.pathname + "?pago=cancelado",
      })
    });
    const data = await res.json();
    if(data.url){ window.location.href = data.url; }
    else{ alert(t("checkout_error")); btn.disabled = false; }
  } catch(e){
    alert(t("checkout_error"));
    btn.disabled = false;
  }
});

/* ============================================================
   ADMIN
   ============================================================ */
function openModal(id){ document.getElementById(id).classList.add("is-open"); }
function closeModal(id){ document.getElementById(id).classList.remove("is-open"); }
document.querySelectorAll("[data-close-modal]").forEach(b=>{
  b.addEventListener("click", ()=>closeModal(b.getAttribute("data-close-modal")));
});

document.getElementById("admin-trigger").addEventListener("click", ()=>{
  if(adminToken){ openModal("admin-upload-overlay"); }
  else{ openModal("admin-login-overlay"); }
});

document.getElementById("admin-login-submit").addEventListener("click", async ()=>{
  const pass = document.getElementById("admin-password-input").value;
  const msg = document.getElementById("admin-login-msg");
  msg.textContent = ""; msg.className = "modal-msg";
  try{
    const res = await fetch(`${FUNCTIONS_URL}/admin-login`, {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":`Bearer ${SUPABASE_ANON_KEY}` },
      body: JSON.stringify({ password: pass })
    });
    const data = await res.json();
    if(data.token){
      adminToken = data.token;
      sessionStorage.setItem("an_admin_token", adminToken);
      msg.textContent = t("admin_login_ok"); msg.classList.add("is-ok");
      document.getElementById("admin-trigger").classList.add("is-admin");
      document.getElementById("admin-password-input").value = "";
      setTimeout(()=>{ closeModal("admin-login-overlay"); openModal("admin-upload-overlay"); renderProducts(); }, 500);
    } else {
      msg.textContent = t("admin_wrong_password"); msg.classList.add("is-error");
    }
  } catch(e){
    msg.textContent = t("admin_wrong_password"); msg.classList.add("is-error");
  }
});

document.getElementById("admin-upload-submit").addEventListener("click", async ()=>{
  const msg = document.getElementById("admin-upload-msg");
  msg.textContent = ""; msg.className = "modal-msg";
  const title = document.getElementById("f-title").value.trim();
  const description = document.getElementById("f-desc").value.trim();
  const category = document.getElementById("f-category").value;
  const price = parseFloat(document.getElementById("f-price").value);
  const technique = document.getElementById("f-technique").value.trim();
  const dimensions = document.getElementById("f-dims").value.trim();
  const file = document.getElementById("f-file").files[0];

  if(!title || !file || isNaN(price)){
    msg.textContent = t("upload_error"); msg.classList.add("is-error");
    return;
  }

  try{
    // 1) pedir URL firmada para subir la imagen
    const urlRes = await fetch(`${FUNCTIONS_URL}/admin-product`, {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":`Bearer ${SUPABASE_ANON_KEY}` },
      body: JSON.stringify({ token: adminToken, action:"get-upload-url", fileName:file.name })
    });
    const urlData = await urlRes.json();
    if(!urlData.signedUrl) throw new Error("no-upload-url");

    // 2) subir el archivo directo a Supabase Storage
    const { error: upErr } = await supabase.storage
      .from("product-images")
      .uploadToSignedUrl(urlData.path, urlData.token, file);
    if(upErr) throw upErr;

    // 3) insertar el producto en la tabla
    const insertRes = await fetch(`${FUNCTIONS_URL}/admin-product`, {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":`Bearer ${SUPABASE_ANON_KEY}` },
      body: JSON.stringify({
        token: adminToken, action:"insert",
        product:{ title, description, category, price, currency:"EUR", technique, dimensions, image_url: urlData.publicUrl }
      })
    });
    const insertData = await insertRes.json();
    if(!insertData.ok) throw new Error(insertData.error || "insert-failed");

    msg.textContent = t("upload_ok"); msg.classList.add("is-ok");
    document.getElementById("f-title").value = "";
    document.getElementById("f-desc").value = "";
    document.getElementById("f-price").value = "";
    document.getElementById("f-technique").value = "";
    document.getElementById("f-dims").value = "";
    document.getElementById("f-file").value = "";
    await loadProducts();
    setTimeout(()=>closeModal("admin-upload-overlay"), 800);
  } catch(e){
    msg.textContent = t("upload_error"); msg.classList.add("is-error");
  }
});

async function deleteProduct(id){
  if(!adminToken) return;
  if(!confirm(t("confirm_delete"))) return;
  try{
    const res = await fetch(`${FUNCTIONS_URL}/admin-product`, {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":`Bearer ${SUPABASE_ANON_KEY}` },
      body: JSON.stringify({ token: adminToken, action:"delete", id })
    });
    const data = await res.json();
    if(data.ok){ await loadProducts(); }
  } catch(e){ /* silencioso */ }
}

   ============================================================ */
document.querySelectorAll("[data-lang]").forEach(btn=>{
  btn.addEventListener("click", ()=>applyLanguage(btn.getAttribute("data-lang")));
});

/* ============================================================
   INICIO
   ============================================================ */
if(adminToken) document.getElementById("admin-trigger").classList.add("is-admin");
updateCartUI();
loadProducts();
