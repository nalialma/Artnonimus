<style>
/* ============================================================
   VARIABLES Y RESET
   ============================================================ */
:root{
  --nav-h: 72px;
  --mg:  #ff007f;
  --cy:  #00f3ff;
  --vi:  #9d00ff;
  --ac:  #39ff14;
  --yw:  #ffee00;
  --ease: cubic-bezier(.16,1,.3,1);
  --glitch-speed: .08s;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
body{
  background:#000;
  font-family:'Rajdhani',sans-serif;
  color:#e0e8ff;
  overflow-x:hidden;
  overscroll-behavior-y:none;
}
body.no-scroll{ overflow:hidden; }
section[id]{ scroll-margin-top:var(--nav-h); }

/* ============================================================
   SCAN-LINE AMBIENTAL (efecto CRT sutil, fijo, pointer-none)
   ============================================================ */
body::after{
  content:'';
  position:fixed; inset:0; z-index:9999; pointer-events:none;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px,
    transparent 3px,
    rgba(0,243,255,.018) 3px,
    rgba(0,243,255,.018) 4px
  );
  animation: scanMove 8s linear infinite;
}
@keyframes scanMove{ from{ background-position:0 0; } to{ background-position:0 200px; } }

/* Resplandor ambiental de fondo */
.ambient-glow{
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 55% 40% at 15% 25%, rgba(157,0,255,.12) 0%, transparent 70%),
    radial-gradient(ellipse 45% 35% at 88% 70%, rgba(255,0,127,.10) 0%, transparent 70%),
    radial-gradient(ellipse 60% 30% at 50% 100%, rgba(0,243,255,.08) 0%, transparent 60%);
}

/* ============================================================
   HUD CORNERS — el elemento firma de este diseño.
   Simula los ángulos cortados de una interfaz táctica militar/sci-fi.
   Uso: envuelve el elemento en <div class="hud-box"><span class="hc"></span>...</div>
   ============================================================ */
.hud-box{ position:relative; }
.hud-box::before,
.hud-box::after,
.hud-box .hc-tr,
.hud-box .hc-bl{
  content:''; position:absolute; pointer-events:none; z-index:2;
  width:16px; height:16px;
  transition: width .3s var(--ease), height .3s var(--ease), opacity .3s;
}
.hud-box::before {top:0; left:0;   border-top:1.5px solid var(--cy); border-left:1.5px solid var(--cy);}
.hud-box::after  {bottom:0; right:0; border-bottom:1.5px solid var(--cy); border-right:1.5px solid var(--cy);}
.hud-box .hc-tr  {top:0; right:0;  border-top:1.5px solid var(--cy); border-right:1.5px solid var(--cy);}
.hud-box .hc-bl  {bottom:0; left:0; border-bottom:1.5px solid var(--cy); border-left:1.5px solid var(--cy);}
.hud-box:hover::before,.hud-box:hover::after,
.hud-box:hover .hc-tr,.hud-box:hover .hc-bl{ width:24px; height:24px; }

/* Versión magenta para énfasis */
.hud-box.mg::before,.hud-box.mg::after,.hud-box.mg .hc-tr,.hud-box.mg .hc-bl{
  border-color: var(--mg);
}

/* ============================================================
   CLIP-PATH — Bordes recortados industriales
   ============================================================ */
.clip-card{
  clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
}
.clip-btn{
  clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
}

/* ============================================================
   GLASSMORPHISM — Paneles cristalinos
   ============================================================ */
.glass{
  background: rgba(0,243,255,.04);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(0,243,255,.12);
}
.glass-mg{
  background: rgba(255,0,127,.04);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,0,127,.15);
}

/* ============================================================
   TIPOGRAFÍA — GLOW
   ============================================================ */
.glow-cy{  text-shadow: 0 0 14px rgba(0,243,255,.8),  0 0 40px rgba(0,243,255,.3); }
.glow-mg{  text-shadow: 0 0 14px rgba(255,0,127,.8),  0 0 40px rgba(255,0,127,.3); }
.glow-vi{  text-shadow: 0 0 14px rgba(157,0,255,.8),  0 0 40px rgba(157,0,255,.3); }
.glow-ac{  text-shadow: 0 0 14px rgba(57,255,20,.8),  0 0 40px rgba(57,255,20,.3); }

/* ============================================================
   GLITCH — Solo en elementos interactivos al hacer hover.
   Los textos de contenido NO usan glitch para mantener legibilidad.
   ============================================================ */
@keyframes glitch-clip-1{
  0%,100%{ clip-path:inset(0 0 95% 0); transform:translate(-2px,0); }
  25%    { clip-path:inset(40% 0 40% 0); transform:translate(2px,-1px); }
  50%    { clip-path:inset(80% 0 5% 0);  transform:translate(-1px,1px); }
  75%    { clip-path:inset(10% 0 75% 0); transform:translate(1px,0); }
}
@keyframes glitch-clip-2{
  0%,100%{ clip-path:inset(85% 0 5% 0);  transform:translate(2px,0); }
  25%    { clip-path:inset(5% 0 70% 0);   transform:translate(-2px,1px); }
  50%    { clip-path:inset(50% 0 30% 0);  transform:translate(1px,-1px); }
  75%    { clip-path:inset(20% 0 60% 0);  transform:translate(-1px,0); }
}
.glitch-wrap{ position:relative; display:inline-block; }
.glitch-wrap::before,
.glitch-wrap::after{
  content: attr(data-text);
  position:absolute; inset:0;
  opacity:0;
  font:inherit; letter-spacing:inherit; color:inherit;
  pointer-events:none;
}
.glitch-wrap:hover::before{
  opacity:.7; color:var(--cy);
  animation: glitch-clip-1 var(--glitch-speed) steps(1) infinite;
  text-shadow: 2px 0 var(--cy);
}
.glitch-wrap:hover::after{
  opacity:.5; color:var(--mg);
  animation: glitch-clip-2 var(--glitch-speed) steps(1) infinite;
  text-shadow: -2px 0 var(--mg);
}

/* ============================================================
   SPLASH
   ============================================================ */
#splash{
  position:fixed; inset:0; z-index:200;
  background:#000;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:2rem;
  transition: opacity .9s ease, visibility .9s;
}
#splash.splash-hide{ opacity:0; visibility:hidden; pointer-events:none; }

.splash-grid{
  position:absolute; inset:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(0,243,255,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,243,255,.06) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
  animation: gridFade 2.6s ease forwards;
}
@keyframes gridFade{ from{opacity:0;} to{opacity:1;} }

.splash-logo-ring{
  position:absolute; border-radius:50%;
  border:1px solid rgba(0,243,255,.3);
  animation:ringPulse 2.8s ease-out infinite;
}
.splash-logo-ring.r2{ animation-delay:.8s; }
.splash-logo-ring.r3{ animation-delay:1.6s; }
@keyframes ringPulse{
  0%  { width:88px;  height:88px;  opacity:.8; }
  100%{ width:280px; height:280px; opacity:0; }
}

.splash-monogram{
  position:relative; z-index:2;
  width:80px; height:80px; border-radius:50%;
  background:rgba(0,243,255,.06);
  border:1px solid rgba(0,243,255,.4);
  display:flex; align-items:center; justify-content:center;
  font-family:'Orbitron',sans-serif; font-size:1.4rem; font-weight:900;
  color:var(--cy); letter-spacing:2px;
  text-shadow:0 0 20px var(--cy);
  animation:splashPulse 2.4s ease-in-out infinite;
}
@keyframes splashPulse{
  0%,100%{ transform:scale(.95); box-shadow:0 0 0 0 rgba(0,243,255,.0); }
  50%    { transform:scale(1.04); box-shadow:0 0 30px 8px rgba(0,243,255,.15); }
}

.splash-label{
  font-family:'Space Mono',monospace; font-size:.68rem;
  letter-spacing:.3em; text-transform:uppercase; color:rgba(0,243,255,.55);
  animation:blinkFade 1.4s ease-in-out infinite;
}
@keyframes blinkFade{ 0%,100%{opacity:.4;} 50%{opacity:1;} }

.splash-bar{
  width:min(220px,70vw); height:3px;
  background: linear-gradient(90deg, var(--vi), var(--cy), var(--mg));
  box-shadow: 0 0 12px rgba(0,243,255,.6);
  animation:barLoad 2.4s ease-out forwards;
}
@keyframes barLoad{ from{transform:scaleX(0);transform-origin:left;} to{transform:scaleX(1);} }

/* ============================================================
   HEADER
   ============================================================ */
#site-header{
  height:var(--nav-h);
  position:fixed; top:0; inset-x:0; z-index:100;
  transition: background .4s ease, border-color .4s ease;
  border-bottom:1px solid transparent;
}
#site-header.scrolled{
  background:rgba(0,0,0,.9);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-bottom-color:rgba(0,243,255,.15);
}

.nav-link{
  position:relative; color:rgba(0,243,255,.5);
  font-family:'Space Mono',monospace; font-size:.72rem;
  letter-spacing:.18em; text-transform:uppercase;
  transition:color .25s;
}
.nav-link::after{
  content:''; position:absolute; left:0; right:0; bottom:-4px;
  height:1px; background:var(--cy);
  box-shadow:0 0 6px var(--cy);
  transform:scaleX(0); transform-origin:left;
  transition:transform .3s var(--ease);
}
.nav-link:hover{ color:var(--cy); }
.nav-link:hover::after{ transform:scaleX(1); }
.nav-link.is-active{ color:var(--cy); text-shadow:0 0 8px rgba(0,243,255,.6); }

/* Selector de idioma */
.lang-pill{
  color:rgba(0,243,255,.4);
  border:1px solid rgba(0,243,255,.18);
  font-family:'Space Mono',monospace; font-size:.64rem;
  transition:all .2s;
}
.lang-pill:hover{ color:var(--cy); border-color:rgba(0,243,255,.5); }
.lang-pill.is-active{
  color:#000; background:var(--cy); border-color:var(--cy);
  box-shadow:0 0 10px rgba(0,243,255,.5);
}

/* ============================================================
   BOTONES CTA
   ============================================================ */
.btn-primary{
  display:inline-flex; align-items:center; gap:.5rem;
  background: linear-gradient(135deg, var(--mg), var(--vi));
  color:#fff; font-family:'Space Mono',monospace;
  font-size:.72rem; letter-spacing:.14em; text-transform:uppercase;
  padding:.75rem 1.6rem;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  transition: all .3s var(--ease);
  text-decoration:none; white-space:nowrap; cursor:pointer; border:none;
  position:relative; overflow:hidden;
}
.btn-primary::before{
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, var(--vi), var(--cy));
  opacity:0; transition:opacity .35s;
}
.btn-primary span{ position:relative; z-index:1; }
.btn-primary:hover{ transform:translateY(-3px); box-shadow:0 0 25px rgba(255,0,127,.5), 0 0 50px rgba(157,0,255,.2); }
.btn-primary:hover::before{ opacity:1; }
.btn-primary:active{ transform:translateY(0); }

.btn-outline{
  display:inline-flex; align-items:center; gap:.5rem;
  border:1px solid rgba(0,243,255,.4); color:var(--cy);
  font-family:'Space Mono',monospace; font-size:.72rem;
  letter-spacing:.14em; text-transform:uppercase;
  padding:.73rem 1.6rem;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  transition: all .3s var(--ease);
  text-decoration:none; white-space:nowrap; cursor:pointer; background:transparent;
}
.btn-outline:hover{
  background:rgba(0,243,255,.08);
  border-color:var(--cy);
  box-shadow:0 0 18px rgba(0,243,255,.3);
  transform:translateY(-3px);
}

/* ============================================================
   MENÚ MÓVIL
   ============================================================ */
#mobile-nav{
  transition:opacity .4s ease, visibility .4s ease;
  background:rgba(0,0,0,.97);
  backdrop-filter:blur(20px);
}
#mobile-nav.is-open{ opacity:1; visibility:visible; }
#mobile-nav:not(.is-open){ opacity:0; visibility:hidden; pointer-events:none; }
#mobile-nav .mnav-link{
  opacity:0; transform:translateX(-14px);
  transition:opacity .45s ease, transform .45s ease;
  color:rgba(0,243,255,.6);
  font-family:'Orbitron',sans-serif; font-size:1.5rem;
  letter-spacing:.1em; text-transform:uppercase;
}
#mobile-nav.is-open .mnav-link{ opacity:1; transform:translateX(0); }
#mobile-nav .mnav-link:hover{ color:var(--cy); text-shadow:0 0 14px rgba(0,243,255,.7); }

/* ============================================================
   REVEAL SCROLL
   ============================================================ */
.reveal{ opacity:0; transform:translateY(24px); transition:opacity .7s var(--ease), transform .7s var(--ease); }
.reveal.is-visible{ opacity:1; transform:translateY(0); }

/* ============================================================
   HERO
   ============================================================ */
.hero-grid-bg{
  background-image:
    linear-gradient(rgba(0,243,255,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,243,255,.05) 1px, transparent 1px);
  background-size:60px 60px;
}
.hero-scan{
  position:absolute; left:0; right:0; height:2px;
  background:linear-gradient(90deg, transparent, var(--cy), transparent);
  box-shadow:0 0 18px 4px rgba(0,243,255,.3);
  animation:scanY 5s linear infinite;
}
@keyframes scanY{ from{top:0;opacity:.8;} to{top:100%;opacity:0;} }

/* Marquesina */
.marquee-track{ animation:marqueeX 32s linear infinite; }
.marquee-track:hover{ animation-play-state:paused; }
@keyframes marqueeX{ from{transform:translateX(0);} to{transform:translateX(-50%);} }

/* ============================================================
   GALERÍA — masonry con columnas CSS
   ============================================================ */
.masonry{ column-count:1; column-gap:1rem; }
@media(min-width:640px){ .masonry{ column-count:2; } }
@media(min-width:1024px){ .masonry{ column-count:3; } }
.masonry-item{ break-inside:avoid; margin-bottom:1rem; }
.masonry-item.is-hidden{ display:none; }
.masonry-item img{ display:block; width:100%; height:auto; transition:transform .6s var(--ease), filter .6s ease; }
.masonry-item:hover img{ transform:scale(1.03); filter:brightness(1.1) saturate(1.2); }

.gallery-overlay{
  background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,.92) 100%);
  opacity:0; transition:opacity .4s ease;
}
.masonry-item:hover .gallery-overlay,
.masonry-item:focus-within .gallery-overlay{ opacity:1; }
.gallery-overlay-btn{ transform:translateY(8px); opacity:0; transition:all .35s ease .05s; }
.masonry-item:hover .gallery-overlay-btn,
.masonry-item:focus-within .gallery-overlay-btn{ transform:translateY(0); opacity:1; }

/* ============================================================
   CINTA "VENDIDO" — sobre piezas de referencia ya vendidas
   ============================================================ */
.sold-ribbon{
  position:absolute; top:14px;
