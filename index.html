<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ArtNonimu's — Portrety w świecie snu | Polska</title>
<meta name="description" content="Ręcznie malowane portrety zwierząt i ludzi na zamówienie. Pracownia dreamcore — malarstwo na drewnie, rysunek ołówkiem, karykatury. Polska.">
<link rel="canonical" href="https://artnonimus.art/">
<style>
/* ============================================================
   ArtNonimu's — DREAMCORE / WEIRDCORE / LIMINAL
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Monoton&family=Unbounded:wght@400;600;800&family=Quicksand:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

:root{
  --pearl:#f6eefc;
  --pink:#ffb8e6;
  --pink-soft: rgba(255,184,230,.55);
  --cyan:#b8f2ff;
  --cyan-soft: rgba(184,242,255,.5);
  --lilac:#d9c2ff;
  --lilac-soft: rgba(217,194,255,.5);
  --butter:#fff3c4;
  --void:#0b0714;
  --glass: rgba(255,255,255,.07);
  --glass-2: rgba(255,255,255,.045);
  --glass-brd: rgba(255,255,255,.18);
  --ease-dream: cubic-bezier(.22,.9,.32,1);
  --nav-h: 64px;
}

*{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
body{
  min-height:100svh;
  background:var(--void);
  color:var(--pearl);
  font-family:'Quicksand',sans-serif;
  overflow-x:hidden;
  position:relative;
  isolation:isolate;
}
img{ max-width:100%; display:block; }
button{ font-family:inherit; }
a{ color:inherit; text-decoration:none; }

/* BACKGROUND VIDEO — mobile gets Vdo1a, desktop gets Vdo4 */
.bg-video{
  position:fixed; inset:0; z-index:0;
  width:100%; height:100%;
  object-fit:cover;
  background:var(--void);
  filter: saturate(1.05) brightness(.78) contrast(1.02);
}
.bg-video-desktop{ display:none; }
@media (min-width:769px){
  .bg-video-mobile{ display:none; }
  .bg-video-desktop{ display:block; }
}
.video-overlay{
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 55% at 50% 38%, rgba(11,7,20,.05) 0%, rgba(11,7,20,.55) 68%, rgba(11,7,20,.85) 100%),
    linear-gradient(180deg, rgba(11,7,20,.35) 0%, transparent 20%, transparent 78%, rgba(11,7,20,.55) 100%);
}
.video-overlay::after{
  content:'';
  position:absolute; inset:-10%;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,184,230,.10), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(184,242,255,.10), transparent 42%);
  animation: hazeDrift 22s ease-in-out infinite alternate;
}
@keyframes hazeDrift{
  from{ transform:translate(0,0) scale(1); }
  to{ transform:translate(3%,-2%) scale(1.06); }
}

.glass-panel{
  background:var(--glass);
  border:1px solid var(--glass-brd);
  backdrop-filter: blur(18px) saturate(1.2);
  -webkit-backdrop-filter: blur(18px) saturate(1.2);
  border-radius:28px;
}

.led-text{
  font-family:'Monoton',cursive;
  letter-spacing:.06em;
  color:var(--pearl);
  text-shadow:
    0 0 6px currentColor,
    0 0 16px var(--pink-soft),
    0 0 32px var(--cyan-soft);
}
.glow-pink{ color:var(--pink); text-shadow:0 0 10px var(--pink-soft), 0 0 28px rgba(255,184,230,.35); }
.glow-cyan{ color:var(--cyan); text-shadow:0 0 10px var(--cyan-soft), 0 0 28px rgba(184,242,255,.35); }
.glow-lilac{ color:var(--lilac); text-shadow:0 0 10px var(--lilac-soft), 0 0 28px rgba(217,194,255,.35); }

@keyframes floatA{ 0%,100%{ transform:translateY(0) rotate(0deg); } 50%{ transform:translateY(-9px) rotate(-1deg); } }
@keyframes floatB{ 0%,100%{ transform:translateY(0) rotate(0deg); } 50%{ transform:translateY(-14px) rotate(1.2deg); } }
@keyframes floatC{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-6px); } }
@keyframes floatD{ 0%,100%{ transform:translateY(0) rotate(0deg); } 50%{ transform:translateY(-11px) rotate(-.8deg); } }

.float-a{ animation: floatA 6.4s ease-in-out infinite; }
.float-b{ animation: floatB 7.8s ease-in-out infinite; }
.float-c{ animation: floatC 5.2s ease-in-out infinite; }
.float-d{ animation: floatD 7s ease-in-out infinite; }

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; scroll-behavior:auto !important; }
}

/* LANGUAGE SWITCH */
.lang-switch{
  position:fixed; top:18px; right:18px; z-index:50;
  display:flex; flex-wrap:wrap; justify-content:flex-end; gap:6px;
  padding:6px;
  max-width:180px;
  border-radius:20px;
}
.lang-pill{
  width:34px; height:34px; border-radius:50%;
  border:1px solid var(--glass-brd);
  background:var(--glass-2);
  backdrop-filter:blur(10px);
  color:rgba(246,238,252,.55);
  font-family:'Space Mono',monospace; font-size:.62rem; letter-spacing:.05em;
  cursor:pointer;
  transition: color .3s, border-color .3s, box-shadow .3s, transform .3s;
}
.lang-pill:hover{ color:var(--pearl); border-color:var(--pink-soft); box-shadow:0 0 14px rgba(255,184,230,.25); transform:translateY(-2px); }
.lang-pill.is-active{
  color:#1a1024; background:var(--pearl);
  border-color:var(--pearl);
  box-shadow:0 0 18px rgba(246,238,252,.5);
}

/* STAGE / LOGO / RADIAL MENU */
.stage{
  min-height:100svh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:2rem;
  padding: calc(var(--nav-h) + 1rem) 1.5rem 6rem;
  position:relative;
  z-index:2;
}

/* Logo: small, and perfectly centered again (no vertical offset) */
.logo-orbit{
  position:relative;
  width:min(24vw,92px); height:min(24vw,92px);
  display:flex; align-items:center; justify-content:center;
}

.logo-btn{
  position:relative; z-index:5;
  width:100%; height:100%;
  border-radius:50%;
  border:none; background:transparent;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.logo-ring{
  position:absolute; inset:0; border-radius:50%;
  border:1px solid rgba(255,255,255,.14);
  pointer-events:none;
}
.logo-ring.r1{ animation: ringBreathe 5s ease-in-out infinite; }
.logo-ring.r2{ inset:-8px; animation: ringBreathe 5s ease-in-out infinite 1.2s; border-color:rgba(184,242,255,.12); }
@keyframes ringBreathe{
  0%,100%{ transform:scale(1); opacity:.5; }
  50%{ transform:scale(1.05); opacity:.9; }
}

.logo-img{
  width:82%; height:82%; object-fit:cover; border-radius:50%;
  mix-blend-mode: screen;
  filter: contrast(1.18) brightness(1.08) saturate(1.15) drop-shadow(0 0 0 rgba(0,0,0,0));
  transition: filter .55s var(--ease-dream), transform .55s var(--ease-dream);
  pointer-events:none; /* clicks always resolve to the button, never get "stuck" on the image */
}
.logo-btn:hover .logo-img,
.logo-btn.is-open .logo-img{
  transform: scale(1.045);
  filter: contrast(1.28) brightness(1.3) saturate(1.35)
          drop-shadow(0 0 18px var(--pink-soft))
          drop-shadow(0 0 34px var(--cyan-soft));
}
.logo-btn:focus-visible{ outline:2px solid var(--cyan); outline-offset:6px; border-radius:50%; }

/* "Tócame" circular LED sign — spins slowly around the logo, doubles as an
   extra-large tap target that also opens the menu (handled via delegation). */
.tap-badge{
  position:absolute; inset:-34px;
  cursor:pointer;
  clip-path:circle(50%);
  z-index:4;
  animation: spinBadge 16s linear infinite;
}
.tap-badge-svg{ width:100%; height:100%; overflow:visible; display:block; }
.tap-badge-text{
  font-family:'Monoton',cursive;
  font-size:14px;
  letter-spacing:3px;
  fill:var(--pink);
  filter: drop-shadow(0 0 4px var(--pink-soft)) drop-shadow(0 0 9px var(--cyan-soft));
}
@keyframes spinBadge{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }
@media (prefers-reduced-motion: reduce){ .tap-badge{ animation:none; } }

.radial-menu{
  position:absolute; inset:0;
  pointer-events:none;
}
.radial-item{
  position:absolute; top:50%; left:50%;
  transform: translate(-50%,-50%) scale(.3);
  opacity:0; pointer-events:none;
  transition: transform .55s var(--ease-dream), opacity .4s ease;
  will-change: transform, opacity;
}
.radial-menu.is-open .radial-item{
  transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1);
  opacity:1; pointer-events:auto;
}
.radial-menu.is-open .radial-item:nth-child(1){ transition-delay:.02s; }
.radial-menu.is-open .radial-item:nth-child(2){ transition-delay:.09s; }
.radial-menu.is-open .radial-item:nth-child(3){ transition-delay:.16s; }

.radial-led{
  display:flex; align-items:center; justify-content:center;
  min-width:96px; padding:.7rem 1rem;
  border-radius:16px;
  border:1px solid var(--glass-brd);
  background:rgba(20,14,32,.62);
  backdrop-filter:blur(14px);
  color:var(--pearl);
  font-family:'Unbounded',sans-serif; font-weight:600; font-size:.66rem;
  letter-spacing:.04em; text-align:center; text-transform:uppercase;
  cursor:pointer;
  transition: box-shadow .35s, border-color .35s, color .35s, transform .35s;
}
.radial-led.tone-pink{ box-shadow: 0 0 16px rgba(255,184,230,.35), inset 0 0 14px rgba(255,184,230,.14); border-color: rgba(255,184,230,.4); }
.radial-led.tone-cyan{ box-shadow: 0 0 16px rgba(184,242,255,.35), inset 0 0 14px rgba(184,242,255,.14); border-color: rgba(184,242,255,.4); }
.radial-led:hover, .radial-led:focus-visible{
  transform:translateY(-3px);
  border-color:var(--pearl);
  color:#fff;
  box-shadow: 0 0 16px var(--pink-soft), 0 0 34px var(--cyan-soft), inset 0 0 18px rgba(255,255,255,.1);
}

.social-row{
  display:flex; align-items:center; justify-content:center; gap:.9rem;
  z-index:5;
}
.social-btn{
  width:42px; height:42px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  border:1px solid var(--glass-brd);
  background:var(--glass-2);
  color:rgba(246,238,252,.65);
  transition: color .3s, border-color .3s, box-shadow .3s, transform .3s;
}
.social-btn svg{ width:17px; height:17px; }
.social-btn:hover{
  color:var(--pearl);
  border-color:var(--pink-soft);
  box-shadow:0 0 16px rgba(255,184,230,.3);
  transform:translateY(-3px);
}

.site-footer{
  position:fixed; bottom:14px; left:0; right:0; z-index:20;
  display:flex; justify-content:center;
}
.footer-credit{
  font-family:'Space Mono',monospace; font-size:.62rem;
  letter-spacing:.16em; text-transform:uppercase;
  color:rgba(246,238,252,.4);
  padding:.5rem 1rem; border-radius:999px;
  border:1px solid transparent;
  transition: color .3s, border-color .3s;
}
.footer-credit:hover{ color:var(--cyan); border-color:rgba(184,242,255,.3); }

/* INFO MODAL */
.info-modal{
  position:fixed; inset:0; z-index:90;
  display:flex; align-items:center; justify-content:center;
  padding:1.5rem;
  background:rgba(11,7,20,.55);
  backdrop-filter:blur(6px);
  opacity:0; visibility:hidden;
  transition: opacity .4s ease, visibility .4s ease;
}
.info-modal.is-open{ opacity:1; visibility:visible; }
.info-panel{
  position:relative;
  max-width:480px; width:100%;
  padding:2.4rem 2rem 2rem;
  text-align:center;
}
.info-panel h2{
  font-family:'Unbounded',sans-serif; font-weight:800; font-size:1.5rem;
  margin-bottom:1rem;
}
.info-panel p{
  font-size:.98rem; line-height:1.6; color:rgba(246,238,252,.75);
  margin-bottom:1.4rem;
}
.info-meta{
  display:grid; grid-template-columns:repeat(3,1fr); gap:.6rem;
  margin-bottom:1.6rem;
}
.info-meta div{
  padding:.7rem .4rem; border-radius:14px;
  background:var(--glass-2); border:1px solid var(--glass-brd);
}
.info-meta strong{ display:block; font-family:'Unbounded',sans-serif; font-size:1rem; }
.info-meta span{ display:block; font-family:'Space Mono',monospace; font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; color:rgba(246,238,252,.5); margin-top:.2rem; }
.info-cta{
  display:inline-flex; align-items:center; gap:.5rem;
  padding:.8rem 1.6rem; border-radius:999px;
  background:linear-gradient(135deg,var(--pink),var(--lilac));
  color:#1a1024; font-family:'Unbounded',sans-serif; font-weight:600; font-size:.78rem;
  letter-spacing:.03em; text-transform:uppercase;
  transition: box-shadow .3s, transform .3s;
}
.info-cta:hover{ box-shadow:0 0 26px rgba(255,184,230,.5); transform:translateY(-2px); }
.info-close{
  position:absolute; top:.4rem; right:.4rem;
  width:36px; height:36px; border-radius:50%;
  border:1px solid var(--glass-brd); background:var(--glass-2);
  color:var(--pearl); font-size:1.1rem; line-height:1; cursor:pointer;
  transition: border-color .3s, color .3s;
}
.info-close:hover{ border-color:var(--pink-soft); color:var(--pink); }

::-webkit-scrollbar{ width:6px; }
::-webkit-scrollbar-track{ background:transparent; }
::-webkit-scrollbar-thumb{ background:linear-gradient(var(--lilac),var(--cyan)); border-radius:3px; }

a:focus-visible, button:focus-visible{ outline:2px solid var(--cyan); outline-offset:3px; }
</style>
</head>
